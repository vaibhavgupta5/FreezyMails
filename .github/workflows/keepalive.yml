name: Keep Render Worker Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: 
  push:
    branches: [ main ] 

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Worker URL
        run: curl -s -L -m 30 https://freezymails.onrender.com/ || echo "Ping failed, but workflow will continue"
